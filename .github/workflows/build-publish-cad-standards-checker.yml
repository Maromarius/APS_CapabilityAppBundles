name: Build & Publish CADStandardsChecker to APS

on:
  push:
    branches: [main, feat/cad-standards-checker]
    paths:
      - 'src/CADStandardsChecker/**'
      - 'bundle/CADStandardsChecker.bundle/**'
      - 'scripts/publish-cad-standards-activity.js'
      - 'scripts/**'
      - 'test/**'
      - '.github/workflows/build-publish-cad-standards-checker.yml'
  workflow_dispatch:

concurrency:
  group: publish-cad-standards-checker
  cancel-in-progress: false

env:
  ENGINE_VERSION: "24_3"           # Autodesk.AutoCAD+24_3 (AutoCAD 2024, net48) — NOT +25_0/+26_0
  BUNDLE_NAME:    "CADStandardsChecker"
  ACTIVITY_ID:    "CheckCADStandards"
  COMMAND:        "CHECKSTANDARDS"
  ALIAS:          "prod"

jobs:
  build-and-publish:
    runs-on: windows-latest   # AutoCAD .NET SDK requires Windows

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'   # The MSBuild/dotnet CLI is .NET 8; the TARGET framework is net48

      - name: Build CADStandardsChecker.dll
        run: |
          dotnet publish src/CADStandardsChecker/CADStandardsChecker.csproj `
            --configuration Release `
            --output "${{ github.workspace }}\bundle\CADStandardsChecker.bundle\Contents\"
        shell: pwsh

      - name: Verify bundle structure
        run: |
          $bundle = "bundle\CADStandardsChecker.bundle"

          Write-Host "=== Bundle contents ==="
          Get-ChildItem -Recurse $bundle | Select-Object FullName | Format-Table

          $checks = @(
            "$bundle\PackageContents.xml",
            "$bundle\Contents\CADStandardsChecker.dll",
            "$bundle\Contents\Newtonsoft.Json.dll"
          )
          foreach ($f in $checks) {
            if (-not (Test-Path $f)) { Write-Error "Missing: $f"; exit 1 }
            Write-Host "✅ $f"
          }
        shell: pwsh

      - name: Zip bundle
        run: |
          $bundle  = "bundle\CADStandardsChecker.bundle"
          $zipName = "${{ env.BUNDLE_NAME }}.zip"

          # DA requires the .bundle folder at the zip root
          Compress-Archive -Path $bundle -DestinationPath $zipName -Force

          Write-Host "=== Zip internal structure ==="
          Add-Type -Assembly System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\$zipName")
          $zip.Entries | Select-Object FullName | Format-Table
          $zip.Dispose()

          Write-Host "✅ $zipName created"
        shell: pwsh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: CADStandardsChecker-bundle
          path: CADStandardsChecker.zip

      - name: Publish AppBundle
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
        run: node scripts/publish-autocad-appbundle.js
        shell: bash

      - name: Publish Activity (CheckCADStandards)
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
        run: node scripts/publish-cad-standards-activity.js
        shell: bash

      - name: Smoke test (run activity on sample DWG)
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          SMOKE_ACTIVITY_ID: ${{ env.ACTIVITY_ID }}
          SAMPLE_DWG:        test/sample.dwg
        run: node scripts/smoke-test-activity.js
        shell: bash

      - name: Summary
        run: |
          echo "✅ AppBundle 'CADStandardsChecker+${{ env.ALIAS }}' published."
          echo "✅ Activity 'CheckCADStandards+${{ env.ALIAS }}' published."
          echo "✅ Smoke test passed (work item status: success)."
          echo "   Engine      : Autodesk.AutoCAD+${{ env.ENGINE_VERSION }}"
          echo "   Command     : CHECKSTANDARDS"
          echo "   Inputs (get): inputFile (req), paramsFile (opt), standardsFile (opt)"
          echo "   Outputs     : result.json, report.json, summary.csv, remediation.md"
        shell: bash
